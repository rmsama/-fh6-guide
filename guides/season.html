<h1>📅 季节赛全通攻略</h1>
<p>每周四晚上更新，持续7天。完成季节赛（Seasonal Events）可以拿<span style="color:#ff6b35">限定车（Exclusive Cars）</span>和大量CR（Credits/游戏币）。</p>
<h2>优先级</h2>
<ol>
<li>先做给<b>限定新车</b>的任务——错过可能要等半年</li>
<li>再做给<b>Super Wheelspin</b>的任务——收益最高</li>
<li>最后做给普通Wheelspin或CR的任务</li>
</ol>
<h2>每周推荐车辆</h2>
<p>季节赛通常限制车辆类型或级别。每周四更新后，用本站 <a href="../tools/tune.html">AI调校计算器</a> 快速配出符合要求的车。</p>
<div class="warn">⚠️ 季节赛80%完成度奖励通常是当季最稀有的车。每周至少做到80%。</div>
