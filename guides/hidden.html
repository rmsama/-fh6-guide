<h1>🗺️ 隐藏车辆 & 车房宝物</h1>
<p>车房宝物（Barn Finds）是散布在地图上的废弃车库，找到后等一段时间就能获得一辆经典车。</p>
<h2>触发方式</h2>
<ul>
<li>推进主线剧情到一定程度会自动解锁</li>
<li>地图上会出现紫色圈标记范围</li>
<li>进入范围后使用无人机（Drone Mode）扫描更快</li>
<li>找到后需要等待真实时间修复（1-7天）</li>
</ul>
