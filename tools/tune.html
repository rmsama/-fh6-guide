<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI工具 · FH6攻略站</title>
<link rel="stylesheet" href="../css/style.css">
<style>
.tool-body { max-width:600px; margin:40px auto; padding:20px; }
.tool-body label { display:block; color:#ccc; margin:12px 0 4px; }
.tool-body select, .tool-body input { width:100%; padding:10px; border-radius:8px; border:1px solid #2a2a3a; background:#1a1a2e; color:#fff; }
.tool-body .btn-pay { margin-top:20px; width:100%; }
.result-box { background:#1a1a2e; border:1px solid #2a2a3a; border-radius:12px; padding:20px; margin-top:20px; display:none; }
.result-box h3 { color:#ff6b35; }
.result-box table { width:100%; margin-top:12px; }
.trial-count { color:#888; font-size:13px; text-align:center; margin-top:8px; }
</style>
</head>
<body>
<nav><div class="logo">🏎️ FH6攻略站</div><div class="nav-links"><a href="../index.html">首页</a><a href="../guides/newbie.html">新手入门</a><a href="../guides/money.html">赚钱</a><a href="../guides/cars.html">车辆</a><a href="../guides/tuning.html">调校</a><a href="tune.html" class="active">AI工具</a></div></nav>
<div class="tool-body">
<h1>🎯 AI调校计算器</h1>
<p>选车 → AI算最优参数。免费3次，VIP无限。</p>

<label>车辆级别</label>
<select id="carClass"><option>A</option><option>S1</option><option>S2</option><option>B</option></select>

<label>用途</label>
<select id="purpose"><option>公路赛</option><option>漂移</option><option>越野</option><option>极速</option></select>

<button class="btn-pay" onclick="calculate()">🔧 开始AI计算</button>
<p class="trial-count" id="trialInfo">剩余免费次数：3</p>

<div class="result-box" id="result">
  <h3>📊 AI推荐调校参数</h3>
  <table>
    <tr><td>胎压(前/后)</td><td id="r1">--</td></tr>
    <tr><td>变速箱齿轮比</td><td id="r2">--</td></tr>
    <tr><td>悬挂(前/后)</td><td id="r3">--</td></tr>
    <tr><td>刹车平衡</td><td id="r4">--</td></tr>
    <tr><td>差速器</td><td id="r5">--</td></tr>
  </table>
</div>
</div>

<script>
var trials = 3;
var tuneData = {
  'A': {'公路赛':['28/28 psi','4.10','450/420','52%','70%/30%'],'漂移':['35/35 psi','3.55','350/380','40%','100%/80%']},
  'S1':{'公路赛':['30/30 psi','3.90','500/470','55%','75%/25%'],'极速':['32/32 psi','3.20','550/520','58%','60%/40%']},
  'S2':{'公路赛':['32/32 psi','3.70','550/520','56%','80%/20%'],'漂移':['38/38 psi','3.40','450/480','42%','100%/90%']}
};

function calculate() {
  var cls = document.getElementById('carClass').value;
  var pur = document.getElementById('purpose').value;
  
  if (trials <= 0) {
    alert('免费次数已用完！解锁VIP无限使用 ¥19.9');
    showPay(); return;
  }
  
  var data = tuneData[cls]?.[pur];
  if (!data) data = ['30/30 psi','3.80','480/450','52%','75%/25%'];
  
  document.getElementById('r1').textContent = data[0];
  document.getElementById('r2').textContent = data[1];
  document.getElementById('r3').textContent = data[2];
  document.getElementById('r4').textContent = data[3];
  document.getElementById('r5').textContent = data[4];
  document.getElementById('result').style.display = 'block';
  
  trials--;
  document.getElementById('trialInfo').textContent = trials > 0 ? '剩余免费次数：'+trials : '免费次数已用完 ⭐ 解锁VIP';
}
</script>
</body>
</html>
